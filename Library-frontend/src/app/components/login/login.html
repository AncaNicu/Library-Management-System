<h1>Login</h1>
<form>
    <div>
        <label>Email </label>
        <input
        type="email"
        name="email"
        [(ngModel)]="loginRequest.email"
        #email="ngModel"
        maxlength="4"
        required>
    </div>
    
    <br>
    <div>
        <label>Password </label>
        <input
        type="password"
        name="password"
        [(ngModel)]="loginRequest.password">
    </div>
    <button 
    type="button"
    (click)="login()">Login</button>
</form>
